<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ICICI Bank Credit Card - Exclusive Privileges Section Replica" />
  <title>Exclusive Privileges - ICICI Bank Credit Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="task1.css" />
</head>
<body>
  <!-- Exclusive Privileges Section -->
  <section class="exclusive-privileges" id="exclusive-privileges">
    <h2 class="section-title">Exclusive Privileges</h2>

    <div class="carousel-container" id="carouselContainer">
      <!-- Left Arrow -->
      <button class="carousel-arrow carousel-arrow--left" id="prevBtn" aria-label="Previous slide">
        <img src="public/arrow_left.webp" alt="Previous" />
      </button>

      <!-- Carousel Stage (3D space) -->
      <div class="carousel-stage" id="carouselStage">

        <!-- Slide 0: ixigo -->
        <div class="carousel-slide" data-index="0">
          <div class="card card--ixigo">
            <div class="card__bg card__bg--ixigo"></div>
            <div class="card__content">
              <p class="card__header">Get</p>
              <h3 class="card__title card__title--orange">ACTIVATION VOUCHER</h3>
              <p class="card__subtitle">with</p>
              <p class="card__offer">Flat ₹1,200/- off.</p>
              <div class="card__logo">
                <img src="public/ixigo.webp" alt="ixigo" class="logo-img logo-img--ixigo" />
              </div>
            </div>
          </div>
        </div>

        <!-- Slide 1: Reliance Digital -->
        <div class="carousel-slide" data-index="1">
          <div class="card card--reliance">
            <div class="card__bg card__bg--reliance"></div>
            <div class="card__content">
              <p class="card__header">Get</p>
              <h3 class="card__title card__title--orange">ACTIVATION VOUCHER</h3>
              <p class="card__subtitle">with up to</p>
              <p class="card__offer">₹1,500/- off*.</p>
              <div class="card__logo">
                <img src="public/reliance_digital.webp" alt="Reliance Digital" class="logo-img logo-img--reliance" />
              </div>
            </div>
          </div>
        </div>

        <!-- Slide 2: BookMyShow -->
        <div class="carousel-slide" data-index="2">
          <div class="card card--bms">
            <div class="card__bg card__bg--bms"></div>
            <div class="card__content">
              <h3 class="card__title card__title--red card__title--enjoy">ENJOY BENEFITS</h3>
              <p class="card__subtitle">worth up to</p>
              <p class="card__offer">₹500/- off*</p>
              <p class="card__subtitle">on your tickets.</p>
              <div class="card__logo">
                <img src="public/bms.webp" alt="BookMyShow" class="logo-img logo-img--bms" />
              </div>
              <p class="card__footnote">*Applicable on selected cards.</p>
            </div>
          </div>
        </div>

        <!-- Slide 3: Apple -->
        <div class="carousel-slide" data-index="3">
          <div class="card card--apple">
            <div class="card__bg card__bg--apple"></div>
            <div class="card__content">
              <p class="card__header">Avail</p>
              <h3 class="card__title card__title--red">APPLE OFFER</h3>
              <p class="card__subtitle">with up to</p>
              <p class="card__offer">₹7,000/- off</p>
            </div>
          </div>
        </div>

      </div>

      <!-- Right Arrow -->
      <button class="carousel-arrow carousel-arrow--right" id="nextBtn" aria-label="Next slide">
        <img src="public/arrow_right.webp" alt="Next" />
      </button>
    </div>

  </section>

  <script src="task1.js"></script>
</body>
</html>
